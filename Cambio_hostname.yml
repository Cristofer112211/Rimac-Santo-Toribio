- name: Cambiar hostname según IP
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    ip_hostname_map:
      "10.66.86.37": STO-CRIS

  tasks:

    - name: Obtener IP real del cliente
      set_fact:
        ip_actual: "{{ ansible_default_ipv4.address }}"

    - name: Mostrar IP detectada
      debug:
        msg: "IP detectada: {{ ip_actual }}"

    - name: Obtener hostname correspondiente
      set_fact:
        nuevo_hostname: "{{ ip_hostname_map[ip_actual] }}"
      when: ip_actual in ip_hostname_map

    - name: Mostrar hostname objetivo
      debug:
        msg: "Hostname a aplicar: {{ nuevo_hostname }}"
      when: nuevo_hostname is defined

    - name: Cambiar hostname con hostnamectl (principal)
      command: hostnamectl set-hostname {{ nuevo_hostname }}
      when: nuevo_hostname is defined
      ignore_errors: yes

    - name: Cambiar hostname alternativo (fallback)
      command: hostname {{ nuevo_hostname }}
      when: nuevo_hostname is defined

    - name: Reiniciar servicio hostname
      command: systemctl restart systemd-hostnamed
      when: nuevo_hostname is defined

    - name: Verificar hostname final
      command: hostname
      register: resultado_hostname

    - name: Mostrar resultado final
      debug:
        msg: "Hostname final: {{ resultado_hostname.stdout }}"
