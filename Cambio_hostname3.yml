- name: Cambiar hostname según IP
  hosts: all
  become: yes

  vars:
    ip_hostname_map:
      "10.66.86.37": STO-CRISAN

  tasks:

    - name: Obtener IP
      command: hostname -I
      register: ip_output

    - name: Extraer IP principal
      set_fact:
        ip_actual: "{{ ip_output.stdout.split()[0] }}"

    - name: Definir hostname
      set_fact:
        nuevo_hostname: "{{ ip_hostname_map[ip_actual] }}"
      when: ip_actual in ip_hostname_map
      
    # MÉTODO 1 (archivo /etc/hostname)
    - name: Escribir hostname en archivo
      copy:
        dest: /etc/hostname
        content: "{{ nuevo_hostname }}"
      when: nuevo_hostname is defined

    # MÉTODO 2 (aplicar en caliente)
    - name: Aplicar hostname en sistema
      command: hostname {{ nuevo_hostname }}
      when: nuevo_hostname is defined

    - name: Confirmar
      debug:
        msg: "Hostname cambiado a {{ nuevo_hostname }}"
      when: nuevo_hostname is defined
